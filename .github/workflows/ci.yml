name: CI

on:
  push:
    branches: [main]
    paths:
      - 'backpropagate/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'requirements*.txt'
      - 'site/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'backpropagate/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'requirements*.txt'
      - 'site/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,full]"

      - name: Lint with ruff
        run: ruff check backpropagate/

      - name: Type check with mypy
        run: mypy backpropagate/ --ignore-missing-imports

      - name: Run tests
        if: matrix.python-version != '3.11'
        run: pytest tests/ -v --tb=short -m "not gpu and not slow"

      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: |
          pytest tests/ --cov=backpropagate --cov-report=xml --cov-fail-under=50 -m "not gpu and not slow"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # --- Security scanning (merged from security.yml) ---

  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit scan (SARIF — all severities to Security tab)
        run: |
          bandit -r backpropagate/ \
            -c pyproject.toml \
            -f sarif \
            -o bandit-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run Bandit (console output — fails on MEDIUM severity / MEDIUM confidence and above)
        run: |
          bandit -r backpropagate/ \
            -c pyproject.toml \
            -l -i \
            -f txt

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev]"

      - name: Run pip-audit
        run: |
          pip-audit \
            --desc on \
            --format markdown \
            --output pip-audit-report.md

      - name: Display results
        if: always()
        run: cat pip-audit-report.md || echo "No report generated"

      - name: Upload audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.md

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      # Pinned to specific Semgrep release + multi-arch manifest-list digest.
      # Refresh via: curl -s https://hub.docker.com/v2/repositories/semgrep/semgrep/tags/<version>
      image: semgrep/semgrep:1.163.0@sha256:7cad2bc2d1e44f87f0bf4be6d1fa23aa90fb72015bebc89fb91385d813987a03
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --config p/python \
            --config p/security-audit \
            --sarif \
            --output semgrep-results.sarif \
            backpropagate/ \
            || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        # --only-verified means TruffleHog actively verified the secret against the live API
        # — these are the highest-confidence positives. Fail the job on any such finding.
        uses: trufflesecurity/trufflehog@34e114876b0b11c390a56381ad16ebd13914f8d5  # v3.88.0
        with:
          extra_args: --only-verified --fail --results=json

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  security-summary:
    name: Security Summary
    needs: [bandit, pip-audit, semgrep, trivy, secrets-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Security scan complete
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit SAST | ${{ needs.bandit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pip-audit | ${{ needs.pip-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep | ${{ needs.semgrep.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results in the Security tab." >> $GITHUB_STEP_SUMMARY

  # --- GitHub Pages deployment (merged from pages.yml) ---
  # Only runs on push to main when site/** changes

  build-site:
    name: Build site
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - uses: actions/upload-pages-artifact@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v4
        with:
          path: site/dist

  deploy-site:
    name: Deploy site to GitHub Pages
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@ddc015e5ed99942b2253d8ea16a0586a01ef2ab1  # v5
