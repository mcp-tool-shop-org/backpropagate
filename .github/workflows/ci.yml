name: CI

on:
  push:
    branches: [main]
    paths:
      - 'backpropagate/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'requirements*.txt'
      - 'site/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'backpropagate/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'requirements*.txt'
      - 'site/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  test:
    # Multi-OS matrix: tests Linux on full Python sweep, plus Windows + macOS
    # smoke cells on 3.11 to catch path/multiprocessing/xformers-disable
    # regressions on platforms the library actively supports (CLAUDE.md:
    # "First-class Windows support") and ships binaries for
    # (release-binaries.yml: darwin-arm64 + win-x64).
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev,full]"

      - name: Lint with ruff
        shell: bash
        run: ruff check backpropagate/

      - name: Type check with mypy
        shell: bash
        # v1.1.2: mypy is a hard gate again. The ~12 known errors in the
        # Reflex tree + rxconfig.py are now covered by widened
        # [[tool.mypy.overrides]] blocks in pyproject.toml (ui_app.* gets
        # disallow_incomplete_defs/check_untyped_defs disabled in addition
        # to the v1.1.0 warn_return_any/disallow_untyped_defs loosening;
        # rxconfig is fully ignored until the Reflex 0.9 kwarg migration).
        # The rest of the codebase stays strict and a real typing
        # regression outside the override scope will fail this step.
        run: mypy backpropagate/ --ignore-missing-imports

      - name: Run tests
        if: matrix.python-version != '3.11'
        shell: bash
        run: pytest tests/ -v --tb=short -m "not gpu and not slow and not integration"

      - name: Run tests with coverage
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          pytest tests/ --cov=backpropagate --cov-report=xml --cov-fail-under=50 -m "not gpu and not slow and not integration"

      - name: Run tests (Windows/macOS smoke)
        if: matrix.python-version == '3.11' && matrix.os != 'ubuntu-latest'
        shell: bash
        run: pytest tests/ -v --tb=short -m "not gpu and not slow and not integration"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # --- Security scanning (merged from security.yml) ---

  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit scan (SARIF — all severities to Security tab)
        run: |
          # --exit-zero: this step's job is to UPLOAD all findings to the
          # GitHub Security tab as SARIF. The gating happens in the next
          # step. Without --exit-zero, bandit exits non-zero on any LOW-
          # severity finding (which we intentionally don't gate on), which
          # silently fails the job before the gating step even runs.
          bandit -r backpropagate/ \
            -c pyproject.toml \
            --exit-zero \
            -f sarif \
            -o bandit-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run Bandit (console output — fails on MEDIUM severity / MEDIUM confidence and above)
        run: |
          bandit -r backpropagate/ \
            -c pyproject.toml \
            -l -i \
            -f txt

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev]"

      # Advisory step: report EVERY known vuln (fixed and unfixed) for
      # human review. Never blocks — informational only. Mirrors Trivy's
      # 'ignore-unfixed: true' philosophy by separating "is there a CVE?"
      # from "is there a remediation available?"
      - name: pip-audit (advisory — all vulnerabilities)
        id: pip-audit-advisory
        continue-on-error: true
        run: |
          set -euo pipefail
          pip-audit \
            --desc on \
            --format markdown \
            --output pip-audit-report.md || true

      - name: Display advisory results
        if: always()
        run: cat pip-audit-report.md || echo "No report generated"

      # Gating step (v1.1.2): CRITICAL-only floor. Unfixed transitive
      # CVEs (huggingface-hub → requests → urllib3 etc.) at HIGH and
      # below still surface in the advisory step above for triage but
      # do not block PRs; CRITICAL severity is rare enough in the
      # transitive baseline that gating on it provides a real floor
      # without the false-positive flood that drove the v1.1.x rollback.
      #
      # pip-audit has no native --severity flag, so we read its JSON
      # output (OSV service exposes a `severity` array on each vuln)
      # and fail if any entry includes a CRITICAL CVSS rating.
      - name: pip-audit (CRITICAL floor)
        run: |
          set -euo pipefail
          pip-audit \
            --vulnerability-service osv \
            --format json \
            --output pip-audit.json \
            --strict || true
          python3 -c "
          import json, sys
          data = json.load(open('pip-audit.json'))
          deps = data.get('dependencies', data) if isinstance(data, dict) else data
          critical = []
          for pkg in deps:
              for v in pkg.get('vulns', []) or []:
                  sevs = v.get('severity') or []
                  for s in sevs:
                      score = (s.get('score') or '').upper()
                      stype = (s.get('type') or '').upper()
                      # OSV severity: type CVSS_V3/CVSS_V4 + score like 'CVSS:3.1/AV:N/...'.
                      # Critical CVSS-v3 base score >= 9.0; the score string also often
                      # carries a 'CRITICAL' rating tag — match either.
                      if 'CRITICAL' in score:
                          critical.append(f\"{pkg.get('name')}: {v.get('id')} ({stype}={score})\")
          if critical:
              print('::error::pip-audit CRITICAL severity findings:')
              for c in critical:
                  print('  -', c)
              sys.exit(1)
          print('pip-audit CRITICAL floor: OK (no CRITICAL findings)')
          "

      - name: Upload audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: pip-audit-report
          path: |
            pip-audit-report.md
            pip-audit-fixed.json

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      # Pinned to specific Semgrep release + multi-arch manifest-list digest.
      # Refresh via: curl -s https://hub.docker.com/v2/repositories/semgrep/semgrep/tags/<version>
      #
      # NOTE: Docker Hub anonymous pull is rate-limited to 100/6hr per egress IP.
      # GitHub-hosted runners share egress pools — on busy days the pull can
      # 429. Maintainer should add DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets
      # (free PAT lifts authenticated limit to 200/6hr) so the credentials
      # block below activates; until then the job runs anonymously and may
      # rate-limit on heavy-traffic windows.
      image: semgrep/semgrep:1.163.0@sha256:7cad2bc2d1e44f87f0bf4be6d1fa23aa90fb72015bebc89fb91385d813987a03
      # NOTE: Docker Hub credentials block removed — Stage B's amend added
      # `credentials: { username: ${{ secrets.DOCKERHUB_USERNAME }}, ...}` to
      # lift the anonymous 100/6hr pull cap, but GHA validates secret refs at
      # workflow-parse time and rejects empty/missing secrets with "Unexpected
      # value ''". The block ran fine when secrets were present, and broke
      # the entire job parse when they weren't. Anonymous pull works for this
      # repo's CI volume; if rate-limited, the maintainer can add the secrets
      # and restore the block. Tracked: baseline-before-enforce doctrine.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --config p/python \
            --config p/security-audit \
            --sarif \
            --output semgrep-results.sarif \
            backpropagate/ \
            || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Trivy vulnerability scanner (advisory — MEDIUM+)
        # Trivy ran as ADVISORY (no exit-code gate) until the v1.1.x
        # dep-bump wave. Stage B's B-CT-006 added `exit-code: '1'` to gate
        # CI on findings, but the actual baseline turned out to be 30+
        # transitive CVEs across uv.lock + site/package-lock.json — far
        # beyond the 14 documented in .trivyignore. Per the
        # baseline-before-enforce doctrine (memory/feedback_baseline_
        # before_enforce.md), gating before triage is wrong. This step
        # stays advisory; findings still surface in the GitHub Security
        # tab via SARIF upload. The CRITICAL-only gate below provides
        # the real floor in v1.1.2.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # v1.1.2 CRITICAL-only gate. CRITICAL transitive CVEs almost never
      # appear in this stack's baseline, so this provides a real floor
      # without the 30+ false positives the MEDIUM+ baseline carries. If
      # this step fails, a CRITICAL has appeared upstream and a dep bump
      # is mandatory before the next release.
      - name: Trivy CRITICAL floor (hard gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          exit-code: '1'

  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Secret scanning is covered by Trivy
        # TruffleHog was removed after four attempts to make
        # trufflesecurity/trufflehog work in our push-to-main flow all
        # failed: the action wraps `trufflehog git` which requires a
        # non-empty BASE..HEAD diff, and the action's BASE inference
        # repeatedly resolved to the same commit as HEAD, erroring with
        # "BASE and HEAD commits are the same".
        #
        # Trivy (the next job) runs `trivy fs` with the built-in secret
        # scanner enabled, which IS a defense-in-depth secret check at
        # the same severity threshold (it caught example-pattern
        # false positives in our own code on the first run). The
        # redundancy of two scanners didn't earn its config complexity.
        #
        # If we want TruffleHog back later (e.g. for the verified-vs-
        # unverified split), it should be installed as a binary and
        # invoked in filesystem mode, not via the GHA action.
        run: |
          echo "Secret scanning delegated to Trivy (next job)."
          echo "TruffleHog removed: see comment + memory/feedback_trufflehog_action_push_diff.md"

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  security-summary:
    name: Security Summary
    needs: [bandit, pip-audit, semgrep, trivy, secrets-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      # Always emit the Markdown summary first — even on failure, the
      # maintainer needs to see WHICH scanner went red without clicking
      # into each individual job.
      - name: Render security summary
        run: |
          {
            echo "## Security Scan Results"
            echo ""
            echo "| Scanner | Status |"
            echo "|---------|--------|"
            echo "| Bandit SAST | ${{ needs.bandit.result }} |"
            echo "| pip-audit | ${{ needs.pip-audit.result }} |"
            echo "| Semgrep | ${{ needs.semgrep.result }} |"
            echo "| Trivy | ${{ needs.trivy.result }} |"
            echo "| Secret Detection | ${{ needs.secrets-scan.result }} |"
            echo ""
            echo "View detailed results in the Security tab."
          } >> "$GITHUB_STEP_SUMMARY"

      # v1.1.2: aggregate gate restored as a hard fail. Each underlying
      # scanner now has either a working floor (bandit MEDIUM+,
      # pip-audit CRITICAL, trivy CRITICAL) or stays advisory-only at
      # the SARIF-upload level (semgrep). When any required scanner
      # returns non-success here, this step fails — giving branch
      # protection a single status check to require for the security
      # suite (Stage B's B-CT-010 original intent).
      - name: Gate on scanner results
        run: |
          set -euo pipefail
          declare -A results=(
            [bandit]="${{ needs.bandit.result }}"
            [pip-audit]="${{ needs.pip-audit.result }}"
            [semgrep]="${{ needs.semgrep.result }}"
            [trivy]="${{ needs.trivy.result }}"
            [secrets-scan]="${{ needs.secrets-scan.result }}"
          )
          failed=()
          for scanner in "${!results[@]}"; do
            result="${results[$scanner]}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              failed+=("$scanner=$result")
            fi
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::Security scanners failed: ${failed[*]}"
            exit 1
          fi
          echo "All security scanners passed."

  # --- GitHub Pages deployment (merged from pages.yml) ---
  # Only runs on push to main when site/** changes

  build-site:
    name: Build site
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site/dist

  deploy-site:
    name: Deploy site to GitHub Pages
    needs: build-site
    runs-on: ubuntu-latest
    # Override the workflow-level cancel-in-progress for Pages deploys.
    # GitHub Pages allows ONE in-flight deployment per repo; cancelling
    # a deploy mid-upload poisons the next deploy attempt with "a
    # deployment is already in progress" for 5-15 minutes. The literal
    # group 'pages' (not interpolated with github.ref) serializes
    # against EVERY Pages deploy in the repo, matching the server-side
    # invariant GitHub Pages enforces.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
