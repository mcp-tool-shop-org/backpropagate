name: CI

on:
  # site/** is intentionally NOT in these paths: the Python test matrix
  # (incl. the macOS ~10x / Windows ~2x smoke cells) has no job that reads
  # site/, so a docs-only commit firing the full matrix is pure CI-minute
  # waste. pages-deploy.yml owns site/** for build+deploy, and doc-drift.yml
  # owns the handbook drift check — both are paths-gated on site/** already.
  push:
    branches: [main]
    paths:
      - 'backpropagate/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'requirements*.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'backpropagate/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'requirements*.txt'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  test:
    # Multi-OS matrix: tests Linux on full Python sweep, plus Windows + macOS
    # smoke cells on 3.11 to catch path/multiprocessing/xformers-disable
    # regressions on platforms the library actively supports (CLAUDE.md:
    # "First-class Windows support"). PyInstaller binary distribution was
    # retired in v1.3 with the npm-launcher path; operators install via
    # pipx / uv tool / pip on every supported OS.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev,full]"

      - name: Lint with ruff
        shell: bash
        run: ruff check backpropagate/

      - name: Type check with mypy
        shell: bash
        # v1.1.2: mypy is a hard gate again. The ~12 known errors in the
        # Reflex tree + rxconfig.py are now covered by widened
        # [[tool.mypy.overrides]] blocks in pyproject.toml (ui_app.* gets
        # disallow_incomplete_defs/check_untyped_defs disabled in addition
        # to the v1.1.0 warn_return_any/disallow_untyped_defs loosening;
        # rxconfig is fully ignored until the Reflex 0.9 kwarg migration).
        # The rest of the codebase stays strict and a real typing
        # regression outside the override scope will fail this step.
        run: mypy backpropagate/ --ignore-missing-imports

      # TESTS-F-003 — opt-in pytest-xdist parallel execution.
      #
      # The env-var gate (BACKPROPAGATE_PYTEST_PARALLEL=1) makes the
      # parallel path explicit and reversible: default CI stays serial
      # (matches the existing baseline; --collect-only count is stable)
      # and an operator / CI ad-hoc run can flip the knob to exercise
      # the parallel path. xdist's `worksteal` distribution is the
      # current best-practice for SFT-heavy suites where individual
      # tests have variable wall-time (load-balancing beats round-robin
      # for the long-tail tests that dominate wall-clock). The tests
      # agent owns the per-test `serial` / `xdist_group` marker audit;
      # this YAML is the consumer.
      - name: Run tests
        if: matrix.python-version != '3.11'
        shell: bash
        env:
          BACKPROPAGATE_PYTEST_PARALLEL: ${{ vars.BACKPROPAGATE_PYTEST_PARALLEL || '0' }}
        run: |
          set -euo pipefail
          PARALLEL_FLAGS=""
          if [ "${BACKPROPAGATE_PYTEST_PARALLEL}" = "1" ]; then
            PARALLEL_FLAGS="-n auto --dist worksteal"
            echo "::notice::pytest-xdist enabled (BACKPROPAGATE_PYTEST_PARALLEL=1)"
          fi
          pytest tests/ -v --tb=short ${PARALLEL_FLAGS} -m "not gpu and not slow and not integration"

      - name: Run tests with coverage
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          BACKPROPAGATE_PYTEST_PARALLEL: ${{ vars.BACKPROPAGATE_PYTEST_PARALLEL || '0' }}
        # Coverage floor is sourced from pyproject.toml
        # ([tool.coverage.report].fail_under) so the two surfaces stay in
        # lockstep — bumping the floor in one place takes effect in CI
        # automatically. tomllib is stdlib in Python 3.11+ (this step pins
        # 3.11, see matrix above) so no extra deps are needed.
        run: |
          set -euo pipefail
          COV_FLOOR=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['coverage']['report']['fail_under'])")
          echo "Coverage floor (from pyproject.toml): ${COV_FLOOR}"
          PARALLEL_FLAGS=""
          if [ "${BACKPROPAGATE_PYTEST_PARALLEL}" = "1" ]; then
            # coverage.py's combine step picks up the per-worker .coverage.*
            # files automatically when -n is set, so --cov + xdist coexist
            # without extra wiring beyond the standard `coverage combine`
            # pytest-cov already does at session teardown.
            PARALLEL_FLAGS="-n auto --dist worksteal"
            echo "::notice::pytest-xdist enabled (BACKPROPAGATE_PYTEST_PARALLEL=1)"
          fi
          pytest tests/ --cov=backpropagate --cov-report=xml --cov-fail-under="${COV_FLOOR}" ${PARALLEL_FLAGS} -m "not gpu and not slow and not integration"

      - name: Run tests (Windows/macOS smoke)
        if: matrix.python-version == '3.11' && matrix.os != 'ubuntu-latest'
        shell: bash
        env:
          BACKPROPAGATE_PYTEST_PARALLEL: ${{ vars.BACKPROPAGATE_PYTEST_PARALLEL || '0' }}
        run: |
          set -euo pipefail
          PARALLEL_FLAGS=""
          if [ "${BACKPROPAGATE_PYTEST_PARALLEL}" = "1" ]; then
            PARALLEL_FLAGS="-n auto --dist worksteal"
            echo "::notice::pytest-xdist enabled (BACKPROPAGATE_PYTEST_PARALLEL=1)"
          fi
          pytest tests/ -v --tb=short ${PARALLEL_FLAGS} -m "not gpu and not slow and not integration"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # TESTSCI-A-009 (v1.4 Stage A) — exercise the pytest-xdist parallel path.
  #
  # The main `test` matrix above keeps BACKPROPAGATE_PYTEST_PARALLEL at the
  # repo-var default ('0' unless an operator flips `vars.BACKPROPAGATE_
  # PYTEST_PARALLEL`), so default CI runs serial. That left the xdist
  # serial-scheduling machinery DORMANT: conftest.py's
  # `pytest_collection_modifyitems` hook (which pins every @pytest.mark.serial
  # test into a single xdist_group so global-state mutators don't race across
  # workers) only does anything under `-n`, so a regression — e.g. a newly
  # added global-state test that forgot the @serial marker, or a hook that
  # stopped grouping — would ship green on a serial-only matrix.
  #
  # This dedicated cell forces the knob ON for ONE Linux/3.12 run so the
  # parallel + serial-grouping path is covered on every CI invocation,
  # independent of the matrix's repo-var default. It's a single Linux job
  # (no win/mac fan-out, no matrix bloat) and runs the same fast selection
  # as the matrix cells. If a serial-marker regression lands, this job goes
  # red while the serial matrix stays green — pinpointing the parallel-only
  # failure surface.
  parallel-xdist:
    name: pytest-xdist parallel path (Linux 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev,full]"

      - name: Run tests under -n auto --dist worksteal
        shell: bash
        env:
          # Forced ON for this job specifically (the matrix honors the repo
          # var; this cell hard-codes the parallel contract so the xdist
          # serial-grouping hook is always exercised).
          BACKPROPAGATE_PYTEST_PARALLEL: "1"
        run: |
          set -euo pipefail
          echo "::notice::pytest-xdist forced ON (BACKPROPAGATE_PYTEST_PARALLEL=1) — exercising serial-group scheduling"
          pytest tests/ -v --tb=short -n auto --dist worksteal -m "not gpu and not slow and not integration"

  # CIDOCS-F-023 (v1.4 Wave 6a) — uv sync --frozen pilot.
  #
  # The main `test` matrix above installs deps via `pip install -e ".[dev,full]"`,
  # ignoring uv.lock. This pilot job exercises `uv sync --frozen --extra dev
  # --extra full` on Linux 3.11 (the most-tested cell) so a future migration
  # of the full matrix has a green baseline to point at.
  #
  # The pilot is intentionally SOFT-GATED (continue-on-error: true) for the
  # first rotation of v1.4.x patch releases — uv sync's --extra semantics
  # differ from pip's bracket-extras, and a cross-platform `[tool.uv]`
  # resolution marker may surface on macOS / Windows cells that this pilot
  # doesn't exercise yet. Flip the gate to strict once we've confirmed
  # the pilot is green across 3+ runs AND we're ready to migrate the full
  # matrix off pip in a coordinated cutover.
  #
  # Per the baseline-before-enforce doctrine: a green soft pilot for one
  # cycle, then a one-line gate flip, then the matrix migration. Never
  # the gate flip + matrix migration in the same commit.
  uv-sync-pilot:
    name: uv sync pilot (Linux 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install uv
        shell: bash
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: uv sync --frozen --extra dev --extra full
        shell: bash
        run: |
          set -euo pipefail
          uv --version
          # --frozen: refuse to update the lockfile mid-CI (the lock is the
          # source of truth for what got tested in this run; modifying it
          # would invalidate the green signal).
          # --extra dev --extra full: the same extras the pip install path
          # ships, so the pilot test surface matches the main matrix.
          uv sync --frozen --extra dev --extra full

      - name: Run pytest (non-gpu / non-slow / non-integration)
        shell: bash
        run: |
          set -euo pipefail
          # Run inside the uv-managed venv. `uv run` activates the right
          # interpreter without a manual `source .venv/bin/activate` step.
          uv run pytest tests/ -v --tb=short -m "not gpu and not slow and not integration"

  # UICOMPILE-A (v1.5 Stage A) — Reflex dry-run compile smoke.
  #
  # The ~2500-test unit suite never compiles the full Reflex app: it
  # smoke-IMPORTS the page tree (`from backpropagate.ui_app.app import app`)
  # but never calls app._compile(). An import succeeds even when a page's
  # render tree holds a Var-type error — e.g. truthiness-branching on an
  # untyped Var, or str-concat on a foreach-item Var — because those crash
  # only at _compile() time, when Reflex walks the tree and codegens React.
  # The v1.5 Stage A re-audit found two such families latent across
  # recovery_banner / error_callout / status_pill / runs / run_detail /
  # models: the app had literally never compiled, yet CI was green.
  #
  # `app._compile(dry_run=True)` walks every page and surfaces any
  # VarTypeError / TypeError with a page + line trace, WITHOUT writing the
  # compiled output (dry_run) and WITHOUT a `reflex init` / pre-existing
  # .web/ (verified locally: the dry run scaffolds a throwaway .web and exits
  # 0 on a clean checkout).
  #
  # Cost discipline (.claude/rules/github-actions.md): one ubuntu job, no
  # matrix. The expensive part is `pip install -e .[ui]` (Reflex + the
  # mandatory core stack incl. torch — torch loads during compile, so there
  # is no torch-free shortcut). dorny/paths-filter short-circuits that
  # install on commits that don't touch the UI surface, so non-UI CI runs
  # pay only a ~10s checkout + filter. GHA has no native per-JOB paths:
  # filter (the workflow-level paths: gate already admits backpropagate/** +
  # pyproject.toml for the whole run); the changed-files action provides the
  # per-job filter the task asks for.
  #
  # Filter surface: the page tree under ui_app/**, PLUS the siblings the
  # pages import + render Vars from — ui_state.py (the rx.State subclasses
  # whose field types drive the Var ops) and ui_theme.py (RADIX_THEME /
  # TOKENS_CSS / STYLESHEETS wired in app.py) — PLUS pyproject.toml (the
  # [ui] extra / reflex pin) and this workflow file (so an edit to the job
  # itself re-runs it, including the PR that introduces it). Gating on
  # ui_app/** alone would miss a compile break introduced via a ui_state.py
  # field-type change — exactly the false-green class this job exists to kill.
  ui-compile-smoke:
    name: Reflex UI dry-run compile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Filter UI-relevant paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            ui:
              - 'backpropagate/ui_app/**'
              - 'backpropagate/ui_state.py'
              - 'backpropagate/ui_theme.py'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'

      - name: Set up Python
        if: steps.filter.outputs.ui == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install the [ui] extra
        id: install-ui
        if: steps.filter.outputs.ui == 'true'
        # Graceful skip: if the [ui] extra can't resolve on this runner, let
        # the job continue — the compile step below detects the missing
        # Reflex import and skips with a ::notice:: rather than failing. A
        # genuine install regression is still caught by the `test` matrix,
        # which installs .[dev,full] (a superset of [ui]) as a hard gate.
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[ui]"

      - name: Reflex dry-run compile (all pages)
        if: steps.filter.outputs.ui == 'true'
        # shell: python so the compile payload is plain Python — no bash
        # heredoc whose closing-delimiter column could itself silently become
        # an IndentationError on the runner (the very class of CI-only
        # breakage this job exists to catch).
        shell: python
        env:
          # Headless: the repro unsets BACKPROPAGATE_UI_AUTH. Empty is the
          # equivalent — the in-app FRONTEND-B-001 guard fires only when the
          # var is TRUTHY and auth enforcement is unavailable, so empty keeps
          # the compile headless + inert.
          BACKPROPAGATE_UI_AUTH: ""
          # Don't phone home from CI. Reflex maps config fields to REFLEX_*
          # env vars, so this flips get_config().telemetry_enabled False and
          # _compile()'s TelemetryContext.start() returns None (no POST).
          # (Verified: reflex_base interpret_boolean_env treats "false" as
          # False.)
          REFLEX_TELEMETRY_ENABLED: "false"
        run: |
          import sys

          try:
              import reflex  # presence probe for the [ui] extra
          except ModuleNotFoundError:
              print("::notice::Reflex ([ui] extra) not installed — skipping UI dry-run compile smoke.")
              sys.exit(0)

          # Importing the app builds the page tree; _compile(dry_run=True)
          # walks every page and codegens React in-memory, surfacing any
          # render-time VarTypeError / TypeError that the import-only unit
          # tests never trigger. dry_run => nothing is written to disk.
          from backpropagate.ui_app import app as a

          a.app._compile(dry_run=True)
          print("Reflex dry-run compile: OK — all pages compiled.")

  # --- Security scanning (merged from security.yml) ---

  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit scan (SARIF — all severities to Security tab)
        run: |
          # --exit-zero: this step's job is to UPLOAD all findings to the
          # GitHub Security tab as SARIF. The gating happens in the next
          # step. Without --exit-zero, bandit exits non-zero on any LOW-
          # severity finding (which we intentionally don't gate on), which
          # silently fails the job before the gating step even runs.
          bandit -r backpropagate/ \
            -c pyproject.toml \
            --exit-zero \
            -f sarif \
            -o bandit-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run Bandit (gating — LOW severity / LOW confidence and above)
        # Emits BOTH the gating txt (failure surface) AND a JSON artifact for
        # post-mortem grep. --exit-zero on the JSON write keeps the file alive
        # even when the gating run goes red; the gating run itself is the
        # process-level non-zero that lights up the security-summary job.
        #
        # Severity contract (v1.4 Wave 6a doc-lie fix per CIDOCS-F /
        # V1_4_BRIEF item 4): `-l -i` is Bandit shorthand for "fail on
        # LOW severity AND LOW confidence and above" — i.e. the broadest
        # floor short of `--exit-zero`. The step name + this comment
        # used to say "MEDIUM/MEDIUM" which mismatched the flags and
        # tripped Wave 5's within-swarm doc-lie sweep. Tightening the
        # floor to MEDIUM/MEDIUM (`-ll -ii`) is a v1.5 candidate — the
        # current v1.4 baseline is clean against LOW/LOW so the bar
        # is real; bumping to MEDIUM/MEDIUM mid-swarm is a semantic
        # shift that earns its own bake-in cycle. See WAVE_6A_TODO.md
        # "V1_4_BRIEF item 4" for the deferral note.
        run: |
          set +e
          bandit -r backpropagate/ \
            -c pyproject.toml \
            --exit-zero \
            -f json \
            -o bandit-gating.json
          bandit -r backpropagate/ \
            -c pyproject.toml \
            -l -i \
            -f txt
          GATE_EXIT=$?
          echo "Bandit gating exit code: ${GATE_EXIT}"
          exit ${GATE_EXIT}

      - name: Upload Bandit artifacts
        # Always upload — the artifact is most useful when the gating step
        # went red and the maintainer needs to grep the structured output to
        # see exactly which file/line tripped which test_id.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: bandit-report
          path: |
            bandit-results.sarif
            bandit-gating.json
          if-no-files-found: warn

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev]"

      # Advisory step: report EVERY known vuln (fixed and unfixed) for
      # human review. Never blocks — informational only. Mirrors Trivy's
      # 'ignore-unfixed: true' philosophy by separating "is there a CVE?"
      # from "is there a remediation available?"
      - name: pip-audit (advisory — all vulnerabilities)
        id: pip-audit-advisory
        continue-on-error: true
        run: |
          set -euo pipefail
          pip-audit \
            --desc on \
            --format markdown \
            --output pip-audit-report.md || true

      - name: Display advisory results
        if: always()
        run: cat pip-audit-report.md || echo "No report generated"

      # CIDOCS-B-101 — triaged HIGH/MED advisories: decision-on-record, not a
      # silent gap.
      #
      # The CRITICAL-only gate below is intentionally narrow (false-positive
      # flood from the v1.1.x rollback). That left three real-but-unfixable
      # advisories *silently* invisible — reported by the advisory step but
      # called out nowhere as a conscious accept:
      #
      #   - GHSA-7wx4-6vff-v64p (diffusers, trust_remote_code bypass) — HIGH
      #   - GHSA-98h9-4798-4q5v (diffusers, trust_remote_code bypass) — HIGH
      #   - GHSA-69w3-r845-3855 (transformers.Trainer, arbitrary code exec) — MED
      #
      # Accepted because:
      #   - diffusers (0.37.1 in uv.lock) is transitive via unsloth and is NOT
      #     imported by any backpropagate/**/*.py — no reachable codepath into
      #     the vulnerable remote-code-load functions. The fix (0.38.0) requires
      #     safetensors>=0.8.0rc0 (a pre-release); per baseline-before-enforce
      #     we don't enable pre-releases for a security bump. Closes when
      #     safetensors 0.8.0 GA lands OR unsloth loosens its floor (see
      #     CHANGELOG "Security" / SECURITY.md).
      #   - transformers.Trainer ACE is held on the 5.0 major-version-compat
      #     work the v1.5 dispatch scopes; the rc-only fix is excluded by the
      #     same pre-release policy.
      # review-by: 2026-08-31 (re-triage at the v1.5 dep-sweep — drop any ID
      # whose upstream fix went GA). Adding an ID here REQUIRES a one-line
      # rationale in the diff.
      #
      # Mechanism: pip-audit has no --ignore-unfixed, so a bare hard gate would
      # re-flood on the documented transitive baseline (.trivyignore). Instead
      # this step ACKs the three IDs (--ignore-vuln matches GHSA aliases) and
      # emits a ::warning:: annotation listing whatever non-accepted advisories
      # remain — so a NEW advisory shows up as a named CI annotation (reviewable)
      # rather than being lost in the advisory markdown, while the documented
      # transitive baseline doesn't turn the run red. CRITICAL still hard-fails
      # in the next step. continue-on-error keeps this informational.
      - name: pip-audit (triaged-accept ACK + surface any new advisory)
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Accepted-with-rationale (review-by 2026-08-31): GHSA-7wx4-6vff-v64p, GHSA-98h9-4798-4q5v, GHSA-69w3-r845-3855"
          # --ignore-vuln matches the primary id OR any alias, so the GHSA form
          # suppresses the PYSEC/CVE-keyed diffusers + transformers entries.
          pip-audit \
            --vulnerability-service osv \
            --ignore-vuln GHSA-7wx4-6vff-v64p \
            --ignore-vuln GHSA-98h9-4798-4q5v \
            --ignore-vuln GHSA-69w3-r845-3855 \
          && echo "pip-audit (post-accept): no advisories outside the accepted set." \
          || echo "::warning::pip-audit reports advisories OUTSIDE the triaged-accepted set (above). These are not yet on the decision-on-record list in ci.yml — triage: bump the dep in pyproject.toml + uv.lock, or add the ID here with a one-line rationale + review-by date. (Unfixed transitive CVEs in .trivyignore are expected here; new FIXABLE advisories are the signal.)"

      # Gating step (v1.1.2): CRITICAL-only floor. Unfixed transitive
      # CVEs (huggingface-hub → requests → urllib3 etc.) at HIGH and
      # below still surface in the advisory step above for triage but
      # do not block PRs; CRITICAL severity is rare enough in the
      # transitive baseline that gating on it provides a real floor
      # without the false-positive flood that drove the v1.1.x rollback.
      #
      # pip-audit has no native --severity flag, so we read its JSON
      # output (OSV service exposes a `severity` array on each vuln)
      # and fail if any entry includes a CRITICAL CVSS rating.
      - name: pip-audit (CRITICAL floor)
        run: |
          set -euo pipefail
          pip-audit \
            --vulnerability-service osv \
            --format json \
            --output pip-audit.json \
            --strict || true
          python3 -c "
          import json, sys
          data = json.load(open('pip-audit.json'))
          deps = data.get('dependencies', data) if isinstance(data, dict) else data
          critical = []
          for pkg in deps:
              for v in pkg.get('vulns', []) or []:
                  sevs = v.get('severity') or []
                  for s in sevs:
                      score = (s.get('score') or '').upper()
                      stype = (s.get('type') or '').upper()
                      # OSV severity: type CVSS_V3/CVSS_V4 + score like 'CVSS:3.1/AV:N/...'.
                      # Critical CVSS-v3 base score >= 9.0; the score string also often
                      # carries a 'CRITICAL' rating tag — match either.
                      if 'CRITICAL' in score:
                          critical.append(f\"{pkg.get('name')}: {v.get('id')} ({stype}={score})\")
          if critical:
              print('::error::pip-audit CRITICAL severity findings — release-blocking. Bump the offending dep in pyproject.toml + uv.lock; the GitHub Security tab also lists each advisory with the patched-version link.')
              for c in critical:
                  print('  -', c)
              sys.exit(1)
          print('pip-audit CRITICAL floor: OK (no CRITICAL findings)')
          "

      - name: Upload audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: pip-audit-report
          path: |
            pip-audit-report.md
            pip-audit-fixed.json

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      # Pinned to specific Semgrep release + multi-arch manifest-list digest.
      # Refresh via: curl -s https://hub.docker.com/v2/repositories/semgrep/semgrep/tags/<version>
      #
      # NOTE: Docker Hub anonymous pull is rate-limited to 100/6hr per egress IP.
      # GitHub-hosted runners share egress pools — on busy days the pull can
      # 429. Maintainer should add DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets
      # (free PAT lifts authenticated limit to 200/6hr) so the credentials
      # block below activates; until then the job runs anonymously and may
      # rate-limit on heavy-traffic windows.
      image: semgrep/semgrep:1.163.0@sha256:7cad2bc2d1e44f87f0bf4be6d1fa23aa90fb72015bebc89fb91385d813987a03
      # NOTE: Docker Hub credentials block removed — Stage B's amend added
      # `credentials: { username: ${{ secrets.DOCKERHUB_USERNAME }}, ...}` to
      # lift the anonymous 100/6hr pull cap, but GHA validates secret refs at
      # workflow-parse time and rejects empty/missing secrets with "Unexpected
      # value ''". The block ran fine when secrets were present, and broke
      # the entire job parse when they weren't. Anonymous pull works for this
      # repo's CI volume; if rate-limited, the maintainer can add the secrets
      # and restore the block. Tracked: baseline-before-enforce doctrine.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Semgrep
        # No `|| true` mask: per docs/ci-gates-triage-plan.md the Semgrep
        # baseline is "0 findings clean after rollback." Exit-code surfaces
        # any new SAST finding to the security-summary aggregate gate (which
        # branch protection requires) rather than silently passing.
        run: |
          semgrep scan \
            --config auto \
            --config p/python \
            --config p/security-audit \
            --sarif \
            --output semgrep-results.sarif \
            backpropagate/

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Trivy vulnerability scanner (advisory — MEDIUM+)
        # Trivy ran as ADVISORY (no exit-code gate) until the v1.1.x
        # dep-bump wave. Stage B's B-CT-006 added `exit-code: '1'` to gate
        # CI on findings, but the actual baseline turned out to be 30+
        # transitive CVEs across uv.lock + site/package-lock.json — far
        # beyond the 14 documented in .trivyignore. Per the
        # baseline-before-enforce doctrine (memory/feedback_baseline_
        # before_enforce.md), gating before triage is wrong. This step
        # stays advisory; findings still surface in the GitHub Security
        # tab via SARIF upload. The CRITICAL-only gate below provides
        # the real floor in v1.1.2.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # v1.1.2 CRITICAL-only gate. CRITICAL transitive CVEs almost never
      # appear in this stack's baseline, so this provides a real floor
      # without the 30+ false positives the MEDIUM+ baseline carries. If
      # this step fails, a CRITICAL has appeared upstream and a dep bump
      # is mandatory before the next release.
      - name: Trivy CRITICAL floor (hard gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          exit-code: '1'

  # secrets-scan-baseline-noop: a deliberately-empty placeholder so the
  # security-summary aggregate gate has a stable required-check ID for the
  # "secret detection" column. The real secret scanning happens in the
  # Trivy job below — `trivy fs` ships with a built-in secret scanner that
  # runs on every CI invocation and surfaces findings through the same
  # SARIF upload path as Trivy's CVE checks. TruffleHog was the previous
  # second scanner; it was retired after four attempts to wire
  # trufflesecurity/trufflehog into the push-to-main flow failed (the
  # action wraps `trufflehog git` which requires a non-empty BASE..HEAD
  # diff, and the action's BASE inference repeatedly resolved to the same
  # commit as HEAD, erroring "BASE and HEAD commits are the same").
  #
  # This job intentionally does NOT scan — keeping it as a transparent
  # no-op avoids two failure modes:
  #   1. Deleting the job would force a branch-protection edit to drop the
  #      "Secret Detection" required-check ID. That coordination cost
  #      isn't worth it given Trivy already covers the scan.
  #   2. Naming it "Secret Detection" while it scans nothing would be a
  #      doc-lie. The explicit -baseline-noop suffix in the job name
  #      tells anyone reading CI output that the work happens elsewhere.
  #
  # If TruffleHog returns later (e.g. for the verified-vs-unverified
  # split), install as a binary in this job and invoke in filesystem mode
  # rather than via the GHA action. See memory/feedback_trufflehog_action_push_diff.md
  # for the breakage details.
  secrets-scan:
    # The display name is preserved as "Secret Detection" so any
    # GH-server-side branch-protection rule keyed off the check name does
    # not silently drop the required check after this rename. The job body
    # is documented as a no-op above; the actual scan happens in Trivy.
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm secret-scan delegation
        run: |
          echo "Secret scanning is performed by the Trivy job (trivy fs built-in secret scanner)."
          echo "This job is a transparent placeholder kept stable for the security-summary aggregate gate."
          echo "See ci.yml comment block above + memory/feedback_trufflehog_action_push_diff.md."

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      # CIDOCS-F-007 (v1.4 Wave 6a) — PyPI metadata end-to-end smoke.
      # Twine's `twine check` validates the long-description rendering
      # but does NOT verify that load-bearing PKG-INFO fields are present
      # (License-Expression, Author, etc.). Wave 2 pinned hatchling@1.30.0
      # after hatchling 1.31's License-Expression regression silently
      # stripped the field; this step is the forcing function that
      # would catch the next variant — a metadata-build regression in any
      # backend gets flagged here before the wheel uploads to PyPI.
      - name: PKG-INFO smoke (License-Expression + Author present)
        shell: bash
        run: |
          set -euo pipefail
          SDIST=$(ls dist/backpropagate-*.tar.gz | head -1)
          if [ -z "${SDIST}" ]; then
            echo "::error::No sdist found in dist/ — build step likely produced wheel-only."
            exit 1
          fi
          # tar -t lists the archive contents; the PKG-INFO path is
          # `<sdist-stem>/PKG-INFO`. Extract just that file to stdout.
          PKGINFO=$(tar -xOf "${SDIST}" --wildcards '*/PKG-INFO' 2>/dev/null || true)
          if [ -z "${PKGINFO}" ]; then
            echo "::error::PKG-INFO not found inside ${SDIST}."
            exit 1
          fi
          MISSING=()
          # License-Expression is the PEP 639 modern shape (hatchling
          # 1.27+, setuptools 78+). Match either it or the legacy
          # ``License: ...`` so non-PEP-639 backends don't false-trip.
          if ! echo "${PKGINFO}" | grep -qE '^(License-Expression|License):'; then
            MISSING+=("License-Expression or License")
          fi
          # Hatchling emits `Author-email:` (lowercase 'e'); setuptools emits
          # `Author:` separately. Match case-insensitively on the optional
          # `-email` suffix to accept both shapes — the actual PKG-INFO from
          # current hatchling has lowercase `Author-email:` which a
          # case-sensitive `-Email` regex would silently miss.
          if ! echo "${PKGINFO}" | grep -qiE '^Author(-Email)?:'; then
            MISSING+=("Author or Author-Email")
          fi
          if ! echo "${PKGINFO}" | grep -qE '^Name:\s*backpropagate\b'; then
            MISSING+=("Name (== backpropagate)")
          fi
          if ! echo "${PKGINFO}" | grep -qE '^Version:'; then
            MISSING+=("Version")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::PKG-INFO is missing load-bearing fields: ${MISSING[*]}"
            echo "Full PKG-INFO follows ---"
            echo "${PKGINFO}"
            exit 1
          fi
          echo "PKG-INFO smoke: load-bearing fields present"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  # CIDOCS-F-003 — wire verify.sh into CI as an observability artifact.
  # Stage C added `verify.sh --format=json`; v1.3 CI consumes it here.
  # CIDOCS-F-006 (v1.4 Wave 6a) — gate flipped from soft (continue-on-error)
  # to strict. The JSON shape has been stable across 5+ green runs (Wave 2 /
  # Wave 3.5 / Stage C / Wave 5.5 / Wave 6a.0), so a verify-smoke failure
  # now blocks the run. The soft-gate fallback at `tail -1 | python -c
  # 'json.loads(...)'` is replaced by a strict `jq` parse — the JSON
  # producer is deterministic enough to treat a parse error as a real
  # failure surface, not noise.
  verify-smoke:
    name: verify.sh smoke
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev,full]"
          # CIDOCS-F-006 (v1.4 Wave 6a) — verify.sh's `build` stage runs
          # `python -m build` + `twine check dist/*`. Pre-Wave-6a these
          # tools were missing from the verify-smoke environment; the
          # soft-gate + permission-denied verify.sh masked the missing
          # deps as a JSON parse failure. Strict-flip surfaced both. The
          # dedicated `build` job (line 540) installs them; verify-smoke
          # mirrors that install so the build + twine_check stages have
          # the tooling they advertise.
          pip install build twine

      - name: Run verify.sh --format=json
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          # verify.sh exits 1 on any stage failure; capture so we can keep
          # the artifact-upload + drift-grep steps running even when the
          # smoke is red. The gating happens in the next step.
          # Separate stdout (JSON stream) from stderr (banner / progress)
          # so the consumer's `tail -1 | json.loads` sees pure JSON. Prior
          # `2>&1` interleaved stderr text with the JSON, breaking the
          # parse and producing the soft-gated red on every run.
          ./verify.sh --format=json > verify.json 2> verify.stderr.log || true

      - name: Upload verify.json artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: verify-json
          path: |
            verify.json
            verify.stderr.log
            verify-*.log
          if-no-files-found: warn

      - name: Gate on first_failed_stage (strict)
        shell: bash
        run: |
          set -euo pipefail
          # CIDOCS-F-006 (v1.4 Wave 6a) — strict gate. The final verify
          # record in JSON mode carries .first_failed_stage as either
          # null (pass) or a string naming the first failing stage. Pull
          # the LAST line of verify.json (the aggregate record) and
          # require it to be null. Any of:
          #   - verify.json missing / empty
          #   - last line fails jq parse
          #   - first_failed_stage is a non-empty string
          # fails the job. The JSON producer at verify.sh has been
          # stable across 5+ green runs; treating a parse error as
          # noise would mean a doc-lie banner ("strict") on a soft gate.
          if ! [ -s verify.json ]; then
            echo "::error::verify.json is empty or missing — verify.sh produced no output. Strict gate fails."
            exit 1
          fi
          # jq -e: non-zero exit on null result. Then we check the
          # non-null result for being a non-empty string (= failure name).
          # Capture the parsed value separately so a jq-internal error is
          # distinguishable from "field is null."
          PARSED=$(tail -1 verify.json | jq -r '.first_failed_stage // ""')
          if [ -n "${PARSED}" ]; then
            echo "::error::verify.sh failed at stage: ${PARSED}. Download the verify-json artifact for the per-stage .log files."
            exit 1
          fi
          echo "verify.sh: all stages passed (first_failed_stage=null)"

  security-summary:
    name: Security Summary
    needs: [bandit, pip-audit, semgrep, trivy, secrets-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      # Always emit the Markdown summary first — even on failure, the
      # maintainer needs to see WHICH scanner went red without clicking
      # into each individual job.
      - name: Render security summary
        run: |
          {
            echo "## Security Scan Results"
            echo ""
            echo "| Scanner | Status |"
            echo "|---------|--------|"
            echo "| Bandit SAST | ${{ needs.bandit.result }} |"
            echo "| pip-audit | ${{ needs.pip-audit.result }} |"
            echo "| Semgrep | ${{ needs.semgrep.result }} |"
            echo "| Trivy | ${{ needs.trivy.result }} |"
            echo "| Secret Detection | ${{ needs.secrets-scan.result }} |"
            echo ""
            echo "View detailed results in the Security tab."
          } >> "$GITHUB_STEP_SUMMARY"

      # v1.1.2: aggregate gate restored as a hard fail. Each underlying
      # scanner now has either a working floor (bandit MEDIUM+,
      # pip-audit CRITICAL, trivy CRITICAL) or stays advisory-only at
      # the SARIF-upload level (semgrep). When any required scanner
      # returns non-success here, this step fails — giving branch
      # protection a single status check to require for the security
      # suite (Stage B's B-CT-010 original intent).
      - name: Gate on scanner results
        run: |
          set -euo pipefail
          declare -A results=(
            [bandit]="${{ needs.bandit.result }}"
            [pip-audit]="${{ needs.pip-audit.result }}"
            [semgrep]="${{ needs.semgrep.result }}"
            [trivy]="${{ needs.trivy.result }}"
            [secrets-scan]="${{ needs.secrets-scan.result }}"
          )
          failed=()
          for scanner in "${!results[@]}"; do
            result="${results[$scanner]}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              failed+=("$scanner=$result")
            fi
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::Security scanners failed: ${failed[*]} — open each scanner's job above for the per-finding output. Bandit / pip-audit / Trivy gate on CRITICAL findings; Semgrep is advisory but a 'failure' status here means the scan itself errored (rate-limit, network, etc.) and should be re-run."
            exit 1
          fi
          echo "All security scanners passed."

  # GitHub Pages deployment moved to .github/workflows/pages-deploy.yml in
  # v1.4 Wave 2 (CIDOCS-A-008). The prior in-ci.yml form combined a
  # workflow-level paths: filter with a job-level if: gate, which created a
  # silent chain-reaction failure: a push touching non-site files would skip
  # build-site, and deploy-site (depends on build-site) would skip with it.
  # The dedicated workflow has paths: [site/**] at the workflow level
  # (cleaner gating) plus workflow_dispatch for one-click self-heal redeploy.
