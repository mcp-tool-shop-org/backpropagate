name: Doc Drift Check

# Forcing-function CI for the within-swarm-doc-lie pattern: a PR that adds a
# new BACKPROPAGATE_* env var, a new --flag, or a new rx.State field WITHOUT
# updating the handbook + the cli.py env-var catalog will fail this check.
#
# Doctrine earned 2026-05-24, v1.3 swarm Wave 5 audit:
# [[within-swarm-doc-lie-drift-detection]]. Stripping or bypassing this
# workflow requires the same doctrine review.

on:
  # Paths mirror every input check_doc_drift.py actually reads, so the gate
  # fires exactly when a doc-drift surface could change and stays idle on
  # unrelated commits (repo GH-Actions rule: every CI workflow paths-gated).
  # README.md + llms.txt + tests/test_error_codes_catalog.py are load-bearing
  # here even though ci.yml omits them — the script's Class 4b (README error
  # codes) and Class 4 (error-codes catalog) checks read them directly, so a
  # README-only or catalog-only drift commit must still trip this gate.
  pull_request:
    branches: [main]
    paths:
      - 'backpropagate/**'
      - 'site/**'
      - 'README.md'
      - 'llms.txt'
      - 'scripts/**'
      - 'tests/test_error_codes_catalog.py'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'backpropagate/**'
      - 'site/**'
      - 'README.md'
      - 'llms.txt'
      - 'scripts/**'
      - 'tests/test_error_codes_catalog.py'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
      - name: Run doc-drift check
        run: python scripts/check_doc_drift.py
