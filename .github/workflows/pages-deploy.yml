name: Pages deploy

# Dedicated workflow for the GitHub Pages site under site/. Split out of
# ci.yml in CIDOCS-A-008 (v1.4 Wave 2) — the prior in-ci.yml form combined a
# workflow-level paths: filter with a job-level if: gate, which created a
# silent chain-reaction failure: a push touching non-site files would skip
# build-site, and deploy-site (depends on build-site) would skip with it.
# Operators saw green CI but the site could drift for weeks unnoticed.
#
# This workflow does the gating cleanly at the workflow level (paths:) and
# always runs both jobs end-to-end when site/** changes. The workflow_dispatch
# trigger gives the maintainer a one-click self-heal redeploy when needed.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

# Pages allows ONE in-flight deployment per repo; cancelling a deploy
# mid-upload poisons the next deploy attempt with "a deployment is already
# in progress" for 5-15 minutes. cancel-in-progress: false matches the
# server-side invariant GitHub Pages enforces.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-site:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy-site:
    name: Deploy site to GitHub Pages
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
