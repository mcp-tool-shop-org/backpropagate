name: Publish

# Triggers — the load-bearing one for the auto-chain is `workflow_run`:
#  * `release: published` does NOT fire when the Release was created by
#    `release.yml` using `secrets.GITHUB_TOKEN` (well-documented GH platform
#    behavior to prevent workflow-author loops). v1.3.0 required a manual
#    `gh workflow run publish.yml --ref v1.3.0` because of this. The
#    `workflow_run` trigger gated on `Release.conclusion == 'success'`
#    (mirrors the pattern post-publish-smoke.yml uses) closes the chain.
#  * `release: published` retained for manual hand-cut Releases (gh release
#    create from the maintainer's terminal — attributed to a user, fires
#    the event normally).
#  * `workflow_dispatch` retained for re-run-from-UI on transient failure.
on:
  release:
    types: [published]
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)publish for, e.g. v1.5.0. Backfills the GHCR version tags additively; PyPI publish is skip-existing so it stays untouched.'
        required: false
        type: string

# Publish workflows must serialize, not cancel. Cancelling a mid-flight
# twine upload leaves PyPI in a state where the next retry fails with E409
# ('File already exists') and needs manual --skip-existing recovery. Group
# per release tag so distinct tags run independently while same-tag
# re-fires queue safely. (The companion release-binaries.yml workflow was
# retired in v1.3 along with the npm-launcher distribution path; this
# concurrency hardening still applies to twine + GHCR uploads here.)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only proceed if the upstream Release
    # workflow succeeded. release: published / workflow_dispatch invocations
    # set workflow_run to null, which evaluates this expression to truthy
    # (we only want to short-circuit FAILED workflow_run events).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      # First attempt: the official OIDC trusted-publishing action.
      # On transient E409 (packument-save race documented across
      # mcp-tool-shop releases — see backprop-trace, ai-jam-sessions,
      # vocal-synth-engine) the publish below is wrapped in a retry
      # via the follow-up step. The action sets PYPI_API_TOKEN via OIDC
      # so the fallback step inherits valid credentials within the same
      # job execution context.
      - name: Publish to PyPI (attempt 1)
        id: publish-attempt-1
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          # --skip-existing on the action side makes the publish idempotent
          # if a previous attempt partially-uploaded one wheel — twine
          # treats the existing file as success rather than E409.
          skip-existing: true

      # Retry on failure with 60s backoff (covers the typical 5-30 min
      # packument-save race window with one retry; if it still fails the
      # maintainer can re-run via workflow_dispatch — already enabled
      # above). skip-existing again means previously-uploaded files are
      # treated as success on the retry.
      - name: Publish to PyPI (attempt 2 — retry after 60s on failure)
        if: steps.publish-attempt-1.outcome == 'failure'
        run: |
          set -euo pipefail
          echo "::warning::PyPI publish attempt 1 failed (likely E409 packument race) — sleeping 60s and retrying via twine"
          sleep 60
        # Sleep step intentionally separated so the retry-publish step
        # is the one that actually exits non-zero if the retry also fails.

      - name: Publish to PyPI (attempt 2 — twine fallback)
        if: steps.publish-attempt-1.outcome == 'failure'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          skip-existing: true
          verbose: true

  docker:
    name: Publish to GHCR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # QEMU registers the arm64 emulator binaries so buildx can produce a
      # linux/arm64 layer on this amd64 GH-hosted runner. The image is small
      # (Python slim + venv) so emulation cost is acceptable; if the wheel
      # builds get slow enough to bite, switch to docker/build-push-action's
      # native runners model once it stabilizes for ARM. CIDOCS-F-009.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Resolve the release version explicitly. The load-bearing trigger is
      # `workflow_run`, under which github.ref points at the DEFAULT BRANCH
      # (main), NOT the tag — so docker/metadata-action's `type=semver` rules
      # (which only fire on a refs/tags/... ref) emit NOTHING and the image
      # never gets a `:X.Y.Z` / `:X.Y` tag (only `:latest` + `:sha-...`). The
      # tag that started the upstream Release run is carried on
      # github.event.workflow_run.head_branch (= the tag ref, e.g. v1.5.0).
      # Feed the resolved version into metadata-action via type=raw below.
      - name: Resolve release version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            workflow_run) REF="${{ github.event.workflow_run.head_branch }}";;
            release)      REF="${{ github.event.release.tag_name }}";;
            *)            REF="${{ inputs.tag }}";;   # workflow_dispatch backfill
          esac
          V="${REF#v}"
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "major_minor=$(echo "$V" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"
          echo "resolved=${V} (event=${{ github.event_name }} ref=${REF})"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # type=raw from the explicitly-resolved version (see Resolve step) —
          # NOT type=semver, which silently emits nothing under workflow_run
          # because github.ref is main, not the tag. Each enable=... gates its
          # raw tag so an empty/missing version never pushes a bogus tag.
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }},enable=${{ steps.ver.outputs.version != '' }}
            type=raw,value=${{ steps.ver.outputs.major_minor }},enable=${{ steps.ver.outputs.major_minor != '' }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          # Multi-arch: amd64 for x86 Linux operators (the existing path) +
          # arm64 for Apple Silicon Macs running Docker Desktop + ARM-Linux
          # operators. Dockerfile uses the upstream `python:3.11-slim`
          # manifest list which already ships arm64, and the venv install
          # uses `pip install --no-cache-dir .` (no architecture-specific
          # wheels at this layer — torch is added in the `[full]` extra
          # which Docker users typically install at runtime, not bake in).
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
