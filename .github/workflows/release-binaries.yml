name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  TOOL_NAME: backpropagate
  ENTRYPOINT: backpropagate/__main__.py

# Workflow-level least-privilege baseline. The `release` job below overrides
# to `contents: write` (needed for softprops/action-gh-release to attach
# binaries). All other jobs (build matrix) only need to read the repo.
permissions:
  contents: read

# Release workflows must serialize, not cancel. A rapid re-publish or
# release-body edit (which retriggers 'release.published') would otherwise
# kill an in-flight PyInstaller build (10-20 min) and ship a release with
# zero binaries attached. Group keeps only one build per release tag in
# flight; queued runs wait rather than cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Linux excluded: libtorch_cpu.so is ~1.5GB on x86_64, producing a 4GB+
    # PyInstaller binary that exceeds GitHub's 2GB release asset limit.
    # Linux users install via: pipx install backpropagate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            ext: ""
          - os: windows-latest
            target: win-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v3

      - run: uv python install 3.12

      - run: uv venv

      - name: Install backpropagate + PyInstaller
        shell: bash
        run: |
          set -euo pipefail

          uv pip install . "pyinstaller>=6.9.0"

          # Windows needs pywin32-ctypes for PyInstaller
          if [ "${{ matrix.target }}" = "win-x64" ]; then
            uv pip install pywin32-ctypes
          fi

          # macOS needs macholib for Mach-O binary packaging
          if [ "${{ matrix.target }}" = "darwin-arm64" ]; then
            uv pip install macholib
          fi

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail

          VERSION=${GITHUB_REF_NAME#v}

          PLATFORM_EXCLUDES=""
          if [ "${{ matrix.target }}" = "darwin-arm64" ]; then
            PLATFORM_EXCLUDES="--exclude-module bitsandbytes"
          fi

          # Invoke PyInstaller via Python to set recursion limit first
          # (torch/transformers have very deep import trees)
          uv run python -c "
          import sys
          sys.setrecursionlimit(10000)
          from PyInstaller.__main__ import run
          run([
              '--onefile', '--name', '${{ env.TOOL_NAME }}', '--console',
              '--strip',
              '--collect-submodules', 'rich',
              '--collect-submodules', 'peft',
              '--collect-submodules', 'trl',
              '--collect-submodules', 'accelerate',
              '--collect-submodules', 'datasets',
              '--hidden-import', 'torch',
              '--hidden-import', 'torch.nn',
              '--hidden-import', 'torch.optim',
              '--hidden-import', 'torch.cuda',
              '--hidden-import', 'torch.backends',
              '--hidden-import', 'torch.utils.data',
              '--hidden-import', 'transformers',
              '--hidden-import', 'transformers.models',
              '--hidden-import', 'transformers.training_args',
              '--hidden-import', 'transformers.trainer',
              '--hidden-import', 'transformers.tokenization_utils',
              '--hidden-import', 'transformers.modeling_utils',
              '--exclude-module', 'torch.test',
              '--exclude-module', 'torch.testing',
              '--exclude-module', 'torch.utils.tensorboard',
              '--exclude-module', 'torch.distributed',
              '--exclude-module', 'transformers.testing_utils',
              '--exclude-module', 'matplotlib',
              '--exclude-module', 'PIL',
              '--exclude-module', 'IPython',
              '--exclude-module', 'notebook',
              '--exclude-module', 'scipy',
              '${{ env.ENTRYPOINT }}',
          ] + '$PLATFORM_EXCLUDES'.split())"

          # Verify PyInstaller actually produced a binary before renaming.
          # Without this, a silent build failure would surface only when 'mv'
          # complains about a missing source file, masking the real error.
          SRC="dist/${{ env.TOOL_NAME }}${{ matrix.ext }}"
          if [ ! -f "$SRC" ]; then
            echo "::error::PyInstaller produced no binary at $SRC"
            ls -la dist/ || true
            exit 1
          fi
          if [ ! -s "$SRC" ]; then
            echo "::error::PyInstaller produced an empty binary at $SRC"
            exit 1
          fi

          OUTNAME="${{ env.TOOL_NAME }}-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
          mv "$SRC" "dist/${OUTNAME}"

          # Smoke-test the produced binary so we never upload a non-functional
          # artifact (e.g., bundled module missing at runtime). --version is
          # import-light: it exercises the entrypoint shim + minimal import tree.
          chmod +x "dist/${OUTNAME}" || true
          if ! "dist/${OUTNAME}" --version; then
            echo "::error::Binary smoke-test failed (dist/${OUTNAME} --version)"
            exit 1
          fi

          echo "ASSET_NAME=${OUTNAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ env.ASSET_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail

          VERSION=${GITHUB_REF_NAME#v}
          cd artifacts

          # Fail loudly if upload-artifact patterns produced zero binaries;
          # otherwise we would publish an empty checksums file alongside the
          # release, leaving users unable to verify integrity.
          shopt -s nullglob
          files=( * )
          shopt -u nullglob
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No binary artifacts found in artifacts/ — nothing to checksum"
            exit 1
          fi

          sha256sum "${files[@]}" > "checksums-${VERSION}.txt"
          cat "checksums-${VERSION}.txt"

          if [ ! -s "checksums-${VERSION}.txt" ]; then
            echo "::error::Generated checksums file is empty"
            exit 1
          fi

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: artifacts/*
