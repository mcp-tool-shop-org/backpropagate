name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  TOOL_NAME: backpropagate
  ENTRYPOINT: backpropagate/__main__.py

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: macos-latest
            target: darwin-arm64
            ext: ""
          - os: windows-latest
            target: win-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - run: uv python install 3.12

      - run: uv venv

      - name: Install backpropagate + PyInstaller
        shell: bash
        run: |
          uv pip install . "pyinstaller>=6.9.0"

          # Windows needs pywin32-ctypes for PyInstaller
          if [ "${{ matrix.target }}" = "win-x64" ]; then
            uv pip install pywin32-ctypes
          fi

          # macOS needs macholib for Mach-O binary packaging
          if [ "${{ matrix.target }}" = "darwin-arm64" ]; then
            uv pip install macholib
          fi

      - name: Replace CUDA torch with CPU-only (Linux)
        if: matrix.target == 'linux-x64'
        shell: bash
        run: |
          # uv resolves CUDA torch (~870MB) from PyPI on Linux.
          # Swap it for CPU-only torch (~200MB) to keep binary under 2GB.
          echo "Before swap:"
          uv pip show torch 2>/dev/null | grep -E "^(Name|Version|Location)" || true
          uv pip uninstall torch
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          echo "After swap:"
          uv pip show torch 2>/dev/null | grep -E "^(Name|Version|Location)" || true

          # Remove nvidia/CUDA packages pulled in as transitive deps
          uv pip uninstall nvidia-cublas-cu12 nvidia-cuda-cupti-cu12 nvidia-cuda-nvrtc-cu12 \
            nvidia-cuda-runtime-cu12 nvidia-cudnn-cu12 nvidia-cufft-cu12 nvidia-curand-cu12 \
            nvidia-cusolver-cu12 nvidia-cusparse-cu12 nvidia-cusparselt-cu12 nvidia-nccl-cu12 \
            nvidia-nvjitlink-cu12 nvidia-nvtx-cu12 \
            nvidia-cublas-cu13 nvidia-cuda-cupti nvidia-cuda-nvrtc nvidia-cuda-runtime \
            nvidia-cudnn-cu13 nvidia-cufft nvidia-curand nvidia-cusolver nvidia-cusparse \
            nvidia-nccl-cu13 nvidia-nvjitlink nvidia-nvshmem-cu12 nvidia-nvshmem-cu13 \
            nvidia-cufile nvidia-cufile-cu12 cuda-bindings triton 2>/dev/null || true

      - name: Strip shared libs (Linux only)
        if: matrix.target == 'linux-x64'
        shell: bash
        run: |
          # Use torch's actual import path — site.getsitepackages() returns the wrong dir in uv venvs
          TORCH_DIR=$(uv run python -c "import pathlib, torch; print(pathlib.Path(torch.__file__).parent)")
          echo "Torch dir: $TORCH_DIR"
          echo "Before strip:"
          du -sh "$TORCH_DIR/lib"/*.so 2>/dev/null || true
          find "$TORCH_DIR" -name "*.so" -exec strip --strip-debug {} \; 2>/dev/null || true
          find "$TORCH_DIR" -name "*.so.*" -exec strip --strip-debug {} \; 2>/dev/null || true
          echo "After strip:"
          du -sh "$TORCH_DIR/lib"/*.so 2>/dev/null || true
          # Also strip pyarrow (datasets dependency, ships large .so files)
          ARROW_DIR=$(uv run python -c "import pathlib, pyarrow; print(pathlib.Path(pyarrow.__file__).parent)" 2>/dev/null) || true
          if [ -n "$ARROW_DIR" ]; then
            echo "Stripping pyarrow at: $ARROW_DIR"
            find "$ARROW_DIR" -name "*.so" -exec strip --strip-debug {} \; 2>/dev/null || true
            find "$ARROW_DIR" -name "*.so.*" -exec strip --strip-debug {} \; 2>/dev/null || true
          fi

      - name: Build binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          PLATFORM_EXCLUDES=""
          if [ "${{ matrix.target }}" = "darwin-arm64" ]; then
            PLATFORM_EXCLUDES="--exclude-module bitsandbytes"
          fi

          # Invoke PyInstaller via Python to set recursion limit first
          # (torch/transformers have very deep import trees)
          uv run python -c "
          import sys
          sys.setrecursionlimit(10000)
          from PyInstaller.__main__ import run
          run([
              '--onefile', '--name', '${{ env.TOOL_NAME }}', '--console',
              '--strip',
              '--collect-submodules', 'rich',
              '--collect-submodules', 'peft',
              '--collect-submodules', 'trl',
              '--collect-submodules', 'accelerate',
              '--collect-submodules', 'datasets',
              '--hidden-import', 'torch',
              '--hidden-import', 'torch.nn',
              '--hidden-import', 'torch.optim',
              '--hidden-import', 'torch.cuda',
              '--hidden-import', 'torch.backends',
              '--hidden-import', 'torch.utils.data',
              '--hidden-import', 'transformers',
              '--hidden-import', 'transformers.models',
              '--hidden-import', 'transformers.training_args',
              '--hidden-import', 'transformers.trainer',
              '--hidden-import', 'transformers.tokenization_utils',
              '--hidden-import', 'transformers.modeling_utils',
              '--exclude-module', 'torch.test',
              '--exclude-module', 'torch.testing',
              '--exclude-module', 'torch.utils.tensorboard',
              '--exclude-module', 'torch.distributed',
              '--exclude-module', 'transformers.testing_utils',
              '--exclude-module', 'matplotlib',
              '--exclude-module', 'PIL',
              '--exclude-module', 'IPython',
              '--exclude-module', 'notebook',
              '--exclude-module', 'scipy',
              '${{ env.ENTRYPOINT }}',
          ] + '$PLATFORM_EXCLUDES'.split())"

          OUTNAME="${{ env.TOOL_NAME }}-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
          mv "dist/${{ env.TOOL_NAME }}${{ matrix.ext }}" "dist/${OUTNAME}"
          echo "ASSET_NAME=${OUTNAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ env.ASSET_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd artifacts
          sha256sum * > "checksums-${VERSION}.txt"
          cat "checksums-${VERSION}.txt"

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
