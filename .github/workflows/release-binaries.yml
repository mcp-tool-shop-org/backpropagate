name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  TOOL_NAME: backpropagate
  ENTRYPOINT: backpropagate/__main__.py

# Workflow-level least-privilege baseline. The `release` job below overrides
# to `contents: write` (needed for softprops/action-gh-release to attach
# binaries). All other jobs (build matrix) only need to read the repo.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Linux excluded: libtorch_cpu.so is ~1.5GB on x86_64, producing a 4GB+
    # PyInstaller binary that exceeds GitHub's 2GB release asset limit.
    # Linux users install via: pipx install backpropagate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            ext: ""
          - os: windows-latest
            target: win-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4

      - uses: astral-sh/setup-uv@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v3

      - run: uv python install 3.12

      - run: uv venv

      - name: Install backpropagate + PyInstaller
        shell: bash
        run: |
          uv pip install . "pyinstaller>=6.9.0"

          # Windows needs pywin32-ctypes for PyInstaller
          if [ "${{ matrix.target }}" = "win-x64" ]; then
            uv pip install pywin32-ctypes
          fi

          # macOS needs macholib for Mach-O binary packaging
          if [ "${{ matrix.target }}" = "darwin-arm64" ]; then
            uv pip install macholib
          fi

      - name: Build binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          PLATFORM_EXCLUDES=""
          if [ "${{ matrix.target }}" = "darwin-arm64" ]; then
            PLATFORM_EXCLUDES="--exclude-module bitsandbytes"
          fi

          # Invoke PyInstaller via Python to set recursion limit first
          # (torch/transformers have very deep import trees)
          uv run python -c "
          import sys
          sys.setrecursionlimit(10000)
          from PyInstaller.__main__ import run
          run([
              '--onefile', '--name', '${{ env.TOOL_NAME }}', '--console',
              '--strip',
              '--collect-submodules', 'rich',
              '--collect-submodules', 'peft',
              '--collect-submodules', 'trl',
              '--collect-submodules', 'accelerate',
              '--collect-submodules', 'datasets',
              '--hidden-import', 'torch',
              '--hidden-import', 'torch.nn',
              '--hidden-import', 'torch.optim',
              '--hidden-import', 'torch.cuda',
              '--hidden-import', 'torch.backends',
              '--hidden-import', 'torch.utils.data',
              '--hidden-import', 'transformers',
              '--hidden-import', 'transformers.models',
              '--hidden-import', 'transformers.training_args',
              '--hidden-import', 'transformers.trainer',
              '--hidden-import', 'transformers.tokenization_utils',
              '--hidden-import', 'transformers.modeling_utils',
              '--exclude-module', 'torch.test',
              '--exclude-module', 'torch.testing',
              '--exclude-module', 'torch.utils.tensorboard',
              '--exclude-module', 'torch.distributed',
              '--exclude-module', 'transformers.testing_utils',
              '--exclude-module', 'matplotlib',
              '--exclude-module', 'PIL',
              '--exclude-module', 'IPython',
              '--exclude-module', 'notebook',
              '--exclude-module', 'scipy',
              '${{ env.ENTRYPOINT }}',
          ] + '$PLATFORM_EXCLUDES'.split())"

          OUTNAME="${{ env.TOOL_NAME }}-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
          mv "dist/${{ env.TOOL_NAME }}${{ matrix.ext }}" "dist/${OUTNAME}"
          echo "ASSET_NAME=${OUTNAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ env.ASSET_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd artifacts
          sha256sum * > "checksums-${VERSION}.txt"
          cat "checksums-${VERSION}.txt"

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: artifacts/*
