name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Serialize per-tag releases (don't cancel an in-flight release just because
# someone re-pushed the same tag or triggered workflow_dispatch). Cancelling a
# mid-flight `npm publish` after the Sigstore-provenance attestation has been
# signed but before the packument-save commits leaves the registry in a state
# where retries fail with E409 ('packument-save race') for 5-30 minutes — see
# memory: npm-publish-409-first-publish-race. Matching publish.yml's group
# shape keeps the publish + GHCR chain reaction (which fires on
# `release: published`) consistent with the upstream release run.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # for GitHub Release creation
  id-token: write       # for npm provenance via Sigstore OIDC

jobs:
  release:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm >=11.5 in sandbox for OIDC trusted-publishing auth
        run: |
          # Node 22 ships npm 10.9, which signs Sigstore provenance fine but
          # cannot negotiate the OIDC auth path for trusted publishing — the
          # PUT returns a misleading 404 "not in this registry".
          #
          # An in-place `npm install -g npm@latest` races on Node 22's bundled
          # npm 10.9 arborist rebuild and breaks irrecoverably (MODULE_NOT_FOUND:
          # promise-retry). Sandbox install + PATH shadow avoids the race.
          # See memory: npm-115-required-for-oidc
          SANDBOX="$HOME/.npm-cli-sandbox"
          mkdir -p "$SANDBOX"
          pushd "$SANDBOX" >/dev/null
          echo '{"name":"npm-cli-sandbox","version":"0.0.0","private":true}' > package.json
          npm install --no-save --no-audit --no-fund --silent npm@latest
          popd >/dev/null
          echo "$SANDBOX/node_modules/.bin" >> "$GITHUB_PATH"
          "$SANDBOX/node_modules/.bin/npm" --version

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag: ${GITHUB_REF_NAME} → ${TAG_VERSION}"
          echo "Package: ${PKG_VERSION}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      # ubuntu-latest's default python3 is not pinned to a particular minor
      # version. tomllib lives in Python 3.11+ stdlib — falling through to a
      # 3.10 default would ImportError. Pin 3.11 explicitly so the version
      # check is reproducible across runner-image bumps.
      # Pinned to the same setup-python SHA as ci.yml + publish.yml (v6.2.0)
      # so the action-runtime parity across workflows is consistent (the
      # v6.x line is the Node-24-runtime major; v6.0.0 → v6.2.0 is a patch
      # bump within that major).
      - name: Setup Python for pyproject version check
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Verify tag matches pyproject.toml version
        run: |
          PY_VERSION=$(python3 -c "import tomllib; print(tomllib.loads(open('pyproject.toml').read())['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "pyproject: ${PY_VERSION}"
          if [ "${PY_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${TAG_VERSION} does not match pyproject.toml version ${PY_VERSION}"
            exit 1
          fi

      # No package-lock.json is committed (sole dep is @mcptoolshop/npm-launcher
      # which is digest-locked by the registry). `npm install` is the honest
      # path here; the previous `npm ci || npm install` fallback masked which
      # branch was taken at release time.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: npm pack dry-run (verify shape)
        run: npm pack --dry-run

      - name: Publish to npm with provenance (OIDC trusted publisher)
        run: npm publish --provenance --access public

      # CIDOCS-F-004 — CycloneDX SBOM generation, attached to the GH Release.
      # Sigstore SBOM attestation already rides the `--provenance` flag on the
      # `npm publish` step above; this step adds the SBOM artifact itself to
      # the release so auditors can grep the dep tree without re-running
      # `pip install` or `npm install`. The Python SBOM is generated from
      # the package's installed dependency tree (cyclonedx-py environment
      # mode — captures the full transitive closure that PyPI install
      # actually pulls). The npm SBOM is generated from package.json.
      # Both files are attached to the GH Release after creation.
      - name: Set up Python for SBOM generation
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Generate CycloneDX SBOMs
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # cyclonedx-bom (entrypoint: cyclonedx-py) is the maintained
          # Python SBOM generator and the de-facto pick for CycloneDX in
          # PyPA tooling. The `environment` subcommand walks the current
          # venv's installed package list — install the package first so
          # the tree matches what `pip install backpropagate` would pull.
          pip install "cyclonedx-bom>=5.0.0"
          # Install backpropagate WITHOUT optional extras so the SBOM
          # tracks the published wheel's required-dep closure. Operators
          # who install with [full] get extra packages; those are surfaced
          # via pyproject.toml's optional-dependencies table, which the
          # `requirements` subcommand below covers as a static manifest.
          pip install .

          # Wheel SBOM — actual installed dependency closure.
          cyclonedx-py environment \
            --output-format JSON \
            --output-file backpropagate-sbom.cdx.json

          # Optional: capture the npm shim's tree too (single dep on the
          # friendly-error shim path; still useful for audit trail).
          if command -v npm >/dev/null 2>&1 && [ -f package.json ]; then
            npm install --no-audit --no-fund --no-save || true
            # @cyclonedx/cyclonedx-npm requires only the lockfile; the
            # repo doesn't commit one but `npm install` above creates one
            # locally for this run.
            npx --yes @cyclonedx/cyclonedx-npm \
              --output-format JSON \
              --output-file backpropagate-npm-sbom.cdx.json || \
              echo "::warning::npm SBOM generation skipped (non-fatal)"
          fi

      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract the [<version>] section from CHANGELOG.md as the release notes.
          # Falls back to the tag name if the section is missing or empty.
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="$(mktemp)"
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" {capture=1; next}
            capture && /^## \[/ {exit}
            capture {print}
          ' CHANGELOG.md > "${NOTES_FILE}"

          if [ ! -s "${NOTES_FILE}" ]; then
            echo "Backpropagate ${GITHUB_REF_NAME}" > "${NOTES_FILE}"
            echo "" >> "${NOTES_FILE}"
            echo "See CHANGELOG.md for details." >> "${NOTES_FILE}"
          fi

          # Create the release if it doesn't already exist. publish.yml fires
          # on the `release: published` event — it'll upload PyPI + Docker as
          # the chain reaction. (release-binaries.yml was retired in v1.3 —
          # PyInstaller distribution is no longer part of the chain.)
          # Skipping creation when the release exists
          # makes this step idempotent (re-runs via workflow_dispatch, or
          # second pushes of the same tag, no longer fail with HTTP 422
          # "Release.tag_name already exists").
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; skipping create."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "Backpropagate ${GITHUB_REF_NAME}" \
              --notes-file "${NOTES_FILE}" \
              --verify-tag
          fi

      # CIDOCS-F-004 — attach SBOM(s) to the GH Release. Done AFTER the
      # release exists per memory: release-yml-must-create-gh-release-
      # before-uploading-assets (gh release upload to a missing release
      # fails with "release not found"). `--clobber` keeps the upload
      # idempotent on workflow_dispatch re-runs.
      - name: Attach SBOMs to GH Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f backpropagate-sbom.cdx.json ]; then
            gh release upload "${GITHUB_REF_NAME}" backpropagate-sbom.cdx.json --clobber
          else
            echo "::warning::backpropagate-sbom.cdx.json missing — SBOM step may have failed"
          fi
          if [ -f backpropagate-npm-sbom.cdx.json ]; then
            gh release upload "${GITHUB_REF_NAME}" backpropagate-npm-sbom.cdx.json --clobber
          fi
